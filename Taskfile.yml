version: '3'

# Taskfile for copier-fullstack-template (template source verification)
# Runs verification on the template itself, NOT on rendered projects.
# Requires: ripgrep (rg), grep

tasks:
  test:
    desc: Verify Clean Architecture boundaries (core has zero outward imports)
    preconditions:
      - sh: command -v rg
        msg: "ripgrep (rg) is required — install via 'scoop install ripgrep' or 'brew install ripgrep'"
    cmds:
      - echo "Checking Clean Architecture boundaries..."
      - |
        if rg "from.*\.(application|infrastructure|presentation|config|ai)" template/backend/src/ --type py --glob "**/core/**"; then
          echo "[FAIL] Core layer contains outward imports"
          exit 1
        fi
      - echo "[OK] Core layer has zero outward imports"

  lint:
    desc: Verify coding conventions (no Final[] on constants)
    preconditions:
      - sh: command -v rg
        msg: "ripgrep (rg) is required — install via 'scoop install ripgrep' or 'brew install ripgrep'"
    cmds:
      - echo "Checking for forbidden Final[] type annotations on constants..."
      - |
        if rg "^[A-Z_][A-Z0-9_]*\s*:\s*Final" template/backend/src --type py; then
          echo "[FAIL] Found Final[] annotations on module-level constants"
          exit 1
        fi
      - echo "[OK] No Final[] type annotations on constants"

  docs:architecture:
    desc: Verify architecture documentation contains verification commands
    cmds:
      - echo "Checking architecture documentation..."
      - grep -q "## Verification Commands" "template/.github/instructions/architecture.instructions.md.jinja"
      - echo "[OK] Architecture verification commands documented"

  docs:conventions:
    desc: Verify coding conventions documentation contains verification commands
    cmds:
      - echo "Checking coding conventions documentation..."
      - grep -q "## Verification Commands" "template/.github/instructions/coding-conventions.instructions.md"
      - echo "[OK] Coding conventions verification commands documented"

  verify-all:
    desc: Run all template verification checks
    cmds:
      - task: test
      - task: lint
      - task: docs:architecture
      - task: docs:conventions
