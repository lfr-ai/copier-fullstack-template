
globs:
  - '**/*.md'

ignores:
  - 'node_modules/**'
  - '**/node_modules/**'
  - '.venv/**'
  - '**/.venv/**'
  - '.tox/**'
  - '**/.tox/**'
  - 'htmlcov/**'
  - 'frontend/dist/**'
  - 'logs/**'

config:
  default: true

  MD013:
    line_length: 88
    code_blocks: false
    tables: false
    headings: false

  MD024:
    siblings_only: true

  MD012: false
  MD028: false
  MD031: false
  MD032: false
  MD034: false
  MD040: false
  MD058: false
  MD060: false

  MD033:
    allowed_elements:
      - br
      - details
      - summary
      - img
      - a
      - sup
      - sub

  MD041: true

  MD046:
    style: fenced

  MD048:
    style: backtick
