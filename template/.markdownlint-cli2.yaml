
globs:
  - '**/*.md'

ignores:
  - 'node_modules/**'
  - '.venv/**'
  - 'htmlcov/**'
  - 'frontend/dist/**'

config:
  MD013:
    line_length: 88
    code_blocks: false
    tables: false
    headings: false

  MD024:
    siblings_only: true

  MD033:
    allowed_elements:
      - br
      - details
      - summary
      - img
      - a
      - sup
      - sub

  MD041: true

  MD046:
    style: fenced

  MD048:
    style: backtick
