_min_copier_version: "9.0.0"
_subdirectory: "template"
_templates_suffix: ".jinja"

_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"

_skip_if_exists:
  - ".env"
  - ".env.dev"
  - ".env.prod"
  - ".env.staging"
  - ".env.test"
  - "CHANGELOG.md"
  - "backend/seeds/initial_data.json"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Project metadata
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

project_name:
  type: str
  help: "Project display name (e.g., 'My Awesome App')"
  validator: "{% if not project_name %}Project name is required{% endif %}"

project_slug:
  type: str
  help: "Python package name (snake_case)"
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"
  validator: "{% if not project_slug | regex_search('^[a-z][a-z0-9_]*$') %}Must be valid Python identifier (lowercase, underscores){% endif %}"

project_description:
  type: str
  help: "Short project description"
  default: "A fullstack Python application"

author_name:
  type: str
  help: "Author full name"
  validator: "{% if not author_name %}Author name is required{% endif %}"

author_email:
  type: str
  help: "Author email address"
  validator: "{% if not author_email | regex_search('.+@.+\\..+') %}Must be a valid email{% endif %}"

github_username:
  type: str
  help: "GitHub username or organization"
  default: "{{ author_name | lower | replace(' ', '-') }}"

copyright_year:
  type: str
  help: "Copyright year"
  default: "{{ '%Y' | strftime }}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Backend language (Python only — extensible later)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

backend_language:
  type: str
  help: "Backend language (Python only for now; extensible later)"
  default: "python"
  choices:
    Python: "python"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Technical choices
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.13"
  choices:
    - "3.12"
    - "3.13"

node_version:
  type: str
  help: "Node.js major version (for frontend tooling)"
  default: "22"
  choices:
    - "20"
    - "22"

frontend_framework:
  type: str
  help: "Frontend framework (Lit or React, both use Vite + TypeScript)"
  default: "lit"
  choices:
    Lit (lightweight Web Components + Vite): "lit"
    React (React 19 + Vite): "react"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Database
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

database_backend:
  type: str
  help: "Database backend"
  default: "postgresql"
  choices:
    None (no database): "none"
    PostgreSQL (local container): "postgresql"
    Azure Database for PostgreSQL Flexible Server: "azure_postgresql"
  when: "{{ cloud_provider == 'none' or cloud_provider == 'azure' }}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Feature flags
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

use_celery:
  type: bool
  help: "Include Celery async task processing (requires Redis)"
  default: true

use_redis:
  type: bool
  help: "Include Redis caching layer and message broker"
  default: true

use_caddy:
  type: bool
  help: "Include Caddy reverse proxy (TLS, compression, security headers)"
  default: true

use_auth:
  type: bool
  help: "Include authentication (JWT + session)"
  default: true

use_playwright:
  type: bool
  help: "Include Playwright E2E tests"
  default: true

use_devcontainer:
  type: bool
  help: "Include devcontainer configuration"
  default: true

with_opencode:
  type: bool
  help: "Include OpenCode AI coding agent install script and configuration"
  default: false

container_runtime:
  type: str
  help: "Container runtime"
  default: "podman"
  choices:
    - "podman"
    - "docker"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Cloud & infrastructure
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

cloud_provider:
  type: str
  help: "Cloud provider for infrastructure-as-code and CLI tooling"
  default: "none"
  choices:
    None (local only): "none"
    Azure: "azure"

azure_location:
  type: str
  help: "Azure region for resource deployment"
  default: "swedencentral"
  when: "{{ cloud_provider == 'azure' }}"

secret_backend:
  type: str
  help: "Secret management backend"
  default: "env"
  choices:
    Env files only: "env"
    Azure Key Vault: "azure_kv"
  when: "{{ cloud_provider == 'azure' or cloud_provider == 'none' }}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AI / RAG infrastructure (Azure only)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

use_azure_openai:
  type: bool
  help: "Include Azure OpenAI Service (GPT models + embeddings for RAG)"
  default: false
  when: "{{ cloud_provider == 'azure' }}"

use_ai_search:
  type: bool
  help: "Include Azure AI Search (vector/hybrid/semantic search for RAG)"
  default: false
  when: "{{ cloud_provider == 'azure' }}"

use_document_intelligence:
  type: bool
  help: "Include Azure Document Intelligence (PDF/document ingestion for RAG)"
  default: false
  when: "{{ cloud_provider == 'azure' }}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  License
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

license:
  type: str
  help: "License type"
  default: "MIT"
  choices:
    - "MIT"
    - "Apache-2.0"
    - "GPL-3.0"
    - "Proprietary"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Post-generation tasks
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

_tasks:
  - command: "git init"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git add ."
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git commit -m 'feat: initial scaffold from copier-fullstack-template'"
    when: "{{ _copier_operation == 'copy' }}"

_message_after_copy: |
  ╔══════════════════════════════════════════════════════════════╗
  ║  Project "{{ project_name }}" created successfully!         ║
  ╚══════════════════════════════════════════════════════════════╝

  This template is designed for LOCAL usage — no remote URL needed.
  You cloned/forked this repo, and ran:

      uvx copier copy --trust . ../{{ project_slug }}

  Next steps:

    1. cd {{ _copier_conf.dst_path }}
    2. zsh scripts/install/install-all.zsh    # Install ALL prerequisites
    3. zsh scripts/bootstrap.zsh              # Full project bootstrap
    4. task dev                               # Start development server

  Or if prerequisites are already installed:

    1. cd {{ _copier_conf.dst_path }}
    2. zsh scripts/setup.zsh                  # Quick setup (deps + pre-commit)
    3. task dev

  On Windows (PowerShell as Admin):

    1. .\scripts\install\install-all.ps1      # Installs WSL2, VS Code, Git, etc.
    2. # Restart, then in WSL/Ubuntu:
    3. zsh scripts/install/install-all.zsh
    4. zsh scripts/bootstrap.zsh
    5. task dev

  To update later:    uvx copier update --trust
  To re-apply:        uvx copier copy --trust <template-dir> <destination>

  See README.md for full documentation.

_message_after_update: |
  Your project "{{ project_name }}" has been updated successfully!
  Please review any conflicts and resolve them.
