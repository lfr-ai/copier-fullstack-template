# Test AI Configuration
# Simplified config for integration testing with mock/fake components

# ============================================================================
# Embeddings
# ============================================================================
embeddings:
  test_embedding:
    type: litellm
    model: text-embedding-3-small
    api_key: ${TEST_API_KEY}
    dimension: 1536

  test_large:
    type: litellm
    model: text-embedding-3-large
    api_key: ${TEST_API_KEY}
    dimension: 3072

# ============================================================================
# Language Models
# ============================================================================
llms:
  test_gpt4:
    type: litellm
    model: gpt-4o
    api_key: ${TEST_API_KEY}
    temperature: 0.7
    max_tokens: 2000

  test_mini:
    type: litellm
    model: gpt-4o-mini
    api_key: ${TEST_API_KEY}
    temperature: 0.5
    max_tokens: 1000

# ============================================================================
# Vector Stores
# ============================================================================
vector_stores:
  test_faiss:
    type: faiss
    dimension: 1536
    persist_dir: ./test_data/faiss

  test_faiss_large:
    type: faiss
    dimension: 3072
    persist_dir: ./test_data/faiss_large

# ============================================================================
# Knowledge Graphs
# ============================================================================
knowledge_graphs:
  test_networkx:
    type: networkx
    persist_path: ./test_data/kg/graph.pkl

# ============================================================================
# Retrievers
# ============================================================================
retrievers:
  test_vector:
    type: vector
    embedding_ref: embeddings.test_embedding
    vector_store_ref: vector_stores.test_faiss
    top_k: 5

  test_graph:
    type: graph
    kg_backend_ref: knowledge_graphs.test_networkx
    llm_ref: llms.test_mini
    depth: 2

  test_ensemble:
    type: ensemble
    retriever_refs:
      - ref: retrievers.test_vector
        weight: 0.7
      - ref: retrievers.test_graph
        weight: 0.3

# ============================================================================
# Pipelines
# ============================================================================
pipelines:
  test_self_crag:
    type: self_crag
    llm_ref: llms.test_gpt4
    retriever_ref: retrievers.test_vector
    relevance_threshold: 0.7
    max_iterations: 3

  test_self_crag_ensemble:
    type: self_crag
    llm_ref: llms.test_mini
    retriever_ref: retrievers.test_ensemble
    relevance_threshold: 0.75
    max_iterations: 2

  test_deep_rag:
    type: deep_rag
    llm_ref: llms.test_gpt4
    retriever_ref: retrievers.test_vector

  test_deep_rag_ensemble:
    type: deep_rag
    llm_ref: llms.test_mini
    retriever_ref: retrievers.test_ensemble
