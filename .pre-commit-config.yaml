# pre-commit hooks for the template repository itself.
# Validates template source files before committing.
# Install: uvx pre-commit install && uvx pre-commit install --hook-type commit-msg
# Run all: uvx pre-commit run --all-files
#
# Note: lychee requires system installation (brew install lychee / cargo install lychee).

repos:
  # ── General file hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: ^template/
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: check-executables-have-shebangs
        exclude: ^template/
      - id: check-shebang-scripts-are-executable
        exclude: ^template/
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=main]

  # ── YAML linting ──
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]
        files: ^(copier\.yml|\.pre-commit-config\.yaml|\.markdownlint-cli2\.yaml|\.yamllint\.yaml|\.github/.+\.ya?ml)$

  # ── Python linting / formatting / typing / security / complexity ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^scripts/.*\.py$
      - id: ruff-format
        files: ^scripts/.*\.py$

  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uvx ty check scripts
        language: system
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-q, -r, scripts]
        pass_filenames: false

  # ── Markdown linting ──
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.yaml"]
        files: ^(README|CONTRIBUTING|CHANGELOG|SECURITY|CODE_OF_CONDUCT|AGENTS)\.md$

  # ── Secret scanning ──
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ── Spell checking ──
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos

  # ── Shell linting ──
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        exclude: ^template/

  # ── Local exhaustive checks (run on every commit) ──
  - repo: local
    hooks:
      - id: template-verify-all
        name: Template verification (architecture + conventions + github alignment)
        entry: task verify-all
        language: system
        pass_filenames: false
        always_run: true

      - id: template-render-smoke
        name: Template render smoke test
        entry: task render
        language: system
        pass_filenames: false
        always_run: true

      - id: template-rendered-tests
        name: Rendered project backend/frontend tests
        entry: task test:rendered
        language: system
        pass_filenames: false
        always_run: true

  # ── Python complexity ──
  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        args: [--max-absolute=B, --max-modules=B, --max-average=A]
        files: ^scripts/.*\.py$

  # ── GitHub Actions linting ──
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # ── Link checking (requires system-installed lychee) ──
  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.23.0
    hooks:
      - id: lychee
        args: ["--no-progress", "--config", ".lychee.toml"]
        types_or: [markdown]
        files: ^[^/]+\.md$

  # ── Duplication detection ──
  - repo: local
    hooks:
      - id: jscpd
        name: jscpd copy-paste detection
        entry: jscpd --config .jscpd.json
        language: node
        additional_dependencies: [jscpd@4.0.5]
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push, manual]

  # ── Conventional commit enforcement ──
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
